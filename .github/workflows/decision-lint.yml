name: Decision Lint

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  decision-lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install
        run: pnpm install

      - name: Build
        run: pnpm -w build

      # 🔥 CLIをpnpm経由で実行（これが安定）
      - name: Lint decisions
        run: pnpm exec decisiongraph lint decisions

      # optional: examples（落ちてもOK）
      - name: Traverse (adr example)
        run: pnpm exec decisiongraph traverse examples/adr/decisions || true

      - name: Traverse (broken examples)
        run: pnpm exec decisiongraph traverse examples/broken/decisions || true
