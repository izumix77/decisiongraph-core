name: Decision Lint

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  decision-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Check io-json version
        run: cat packages/cli/node_modules/@decisiongraph/io-json/package.json | grep version

      - name: Build
        run: pnpm -w build

      # Smoke test: CLI is operational
      - name: Lint (smoke test)
        run: node packages/cli/bin/decisiongraph lint decisions/demo.json

      # ADR example: expected to FAIL (demonstrates superseded dependency detection)
      # This is intentional — remove --strict to allow warnings only
      - name: Traverse (adr example — expected violations)
        run: |
          node packages/cli/bin/decisiongraph traverse examples/adr/decisions || true

      # Broken examples: expected to FAIL (demonstrates ERROR and WARN detection)
      - name: Traverse (broken examples — expected violations)
        run: |
          node packages/cli/bin/decisiongraph traverse examples/broken/decisions || true
